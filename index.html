<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Predictor</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Inter,Segoe UI,sans-serif;
    background:
        radial-gradient(circle at top left,#1f4cff 0%,transparent 35%),
        radial-gradient(circle at top right,#8a2be2 0%,transparent 35%),
        #08111f;
    color:#fff;
    min-height:100vh;
    padding:30px;
}

h1{
    text-align:center;
    font-size:3rem;
    margin-bottom:15px;
    font-weight:800;
    letter-spacing:-1px;
}

h2{
    margin:40px 0 20px;
    text-align:center;
}

h3{
    margin-bottom:15px;
    text-align:center;
    font-size:1.15rem;
}

#champion{
    text-align:center;
    font-size:2rem;
    font-weight:800;
    margin:20px auto 40px;
    color:#ffd700;
}

.groups{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
    margin-bottom:50px;
}

.group{
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:18px;
    box-shadow:
        0 8px 25px rgba(0,0,0,.25);
}

.team{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    margin-bottom:8px;
    background:rgba(255,255,255,.05);
    border-radius:10px;
    transition:.2s;
}

.team:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,.1);
}

.team span:first-child{
    font-weight:600;
}

.team-controls{
    display:flex;
    gap:4px;
}

.team-controls button{
    width:32px;
    height:32px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#1d4ed8;
    color:white;
    font-weight:bold;
    transition:.2s;
}

.team-controls button:hover{
    background:#2563eb;
    transform:scale(1.05);
}

.bracket{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    align-items:start;
}

.round{
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:20px;
    min-height:400px;
}

.round h3{
    margin-bottom:20px;
    font-size:1.2rem;
}

.match{
    background:rgba(255,255,255,.05);
    border-radius:12px;
    overflow:hidden;
    margin-bottom:18px;
    border:1px solid rgba(255,255,255,.05);
}

.match div{
    padding:12px 14px;
    cursor:pointer;
    transition:.2s;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.match div:last-child{
    border-bottom:none;
}

.match div:hover{
    background:rgba(255,255,255,.12);
}

.selected{
    background:linear-gradient(
        90deg,
        #2563eb,
        #4f46e5
    ) !important;
    font-weight:700;
}

.selected:hover{
    background:linear-gradient(
        90deg,
        #2563eb,
        #4f46e5
    ) !important;
}

.round:nth-child(1){
    border-top:3px solid #3b82f6;
}

.round:nth-child(2){
    border-top:3px solid #8b5cf6;
}

.round:nth-child(3){
    border-top:3px solid #ec4899;
}

.round:nth-child(4){
    border-top:3px solid #f59e0b;
}

@media (max-width:1200px){

    .bracket{
        grid-template-columns:1fr 1fr;
    }

}

@media (max-width:700px){

    body{
        padding:15px;
    }

    h1{
        font-size:2rem;
    }

    .groups{
        grid-template-columns:1fr;
    }

    .bracket{
        grid-template-columns:1fr;
    }

}
</style>
</head>
<body>

<h1>World Cup Predictor</h1>

<div id="champion"></div>

<div class="groups" id="groups"></div>

<h2>Knockout Stage</h2>

<div class="bracket">

<div class="round">
<h3>Round of 16</h3>
<div id="r16"></div>
</div>

<div class="round">
<h3>Quarter Finals</h3>
<div id="qf"></div>
</div>

<div class="round">
<h3>Semi Finals</h3>
<div id="sf"></div>
</div>

<div class="round">
<h3>Final</h3>
<div id="final"></div>
</div>

</div>

<script>

const defaultGroups = {

A:[
"Denmark",
"Serbia",
"Netherlands",
"Kazakhstan"
],

B:[
"Norway",
"Czech Republic",
"France",
"Argentina"
],

C:[
"England",
"Romania",
"Ireland",
"India"
],

D:[
"Finland",
"Slovakia",
"Greece",
"Brazil"
],

E:[
"Italy",
"Hungary",
"Spain",
"Australia"
],

F:[
"Turkey",
"Poland",
"Germany",
"Canada"
],

G:[
"Scotland",
"Lithuania",
"Sweden",
"USA"
],

H:[
"Portugal",
"Belgium",
"Croatia",
"Japan"
]

};

let groups =
JSON.parse(localStorage.getItem("groups")) ||
structuredClone(defaultGroups);

let winners =
JSON.parse(localStorage.getItem("winners")) || {};

function save(){
    localStorage.setItem("groups",JSON.stringify(groups));
    localStorage.setItem("winners",JSON.stringify(winners));
}

function move(group,index,direction){

    const arr=groups[group];

    const newIndex=index+direction;

    if(newIndex<0 || newIndex>=arr.length) return;

    [arr[index],arr[newIndex]]=
    [arr[newIndex],arr[index]];

    save();
    render();
}

function renderGroups(){

    const container=
    document.getElementById("groups");

    container.innerHTML="";

    Object.entries(groups).forEach(([letter,teams])=>{

        const div=document.createElement("div");
        div.className="group";

        let html=`<h3>Group ${letter}</h3>`;

        teams.forEach((team,index)=>{

            html+=`
            <div class="team">
                <span>${index+1}. ${team}</span>
                <span class="team-controls">
                    <button onclick="move('${letter}',${index},-1)">↑</button>
                    <button onclick="move('${letter}',${index},1)">↓</button>
                </span>
            </div>
            `;
        });

        div.innerHTML=html;
        container.appendChild(div);

    });

}

function qualifiers(){

    const q={};

    for(const g in groups){

        q[g+"1"]=groups[g][0];
        q[g+"2"]=groups[g][1];

    }

    return q;
}

function buildBracket(){

    const q=qualifiers();

    return {

        r16:{
            M1:[q.G1,q.H2],
            M2:[q.A1,q.F2],
            M3:[q.F1,q.C2],
            M4:[q.H1,q.A2],

            M5:[q.D1,q.G2],
            M6:[q.B1,q.E2],
            M7:[q.E1,q.B2],
            M8:[q.C1,q.D2]
        }

    };

}

function winnerMatch(id,teams,round,next){

    const saved=winners[id];

    return `
    <div class="match">

        <div
        class="${saved===teams[0]?'selected':''}"
        onclick="pickWinner('${id}','${teams[0]}')">
        ${teams[0] || '-'}
        </div>

        <div
        class="${saved===teams[1]?'selected':''}"
        onclick="pickWinner('${id}','${teams[1]}')">
        ${teams[1] || '-'}
        </div>

    </div>
    `;
}

function pickWinner(matchId,team){

    if(!team) return;

    winners[matchId]=team;

    save();
    render();

}

function render(){

    renderGroups();

    const bracket=buildBracket();

    const r16Div=document.getElementById("r16");

    let r16html="";

    Object.entries(bracket.r16)
    .forEach(([id,teams])=>{

        r16html+=winnerMatch(id,teams);

    });

    r16Div.innerHTML=r16html;

    const qfMatches={

        QF1:[winners.M1,winners.M2],
        QF2:[winners.M3,winners.M4],
        QF3:[winners.M5,winners.M6],
        QF4:[winners.M7,winners.M8]

    };

    let qfhtml="";

    Object.entries(qfMatches)
    .forEach(([id,teams])=>{

        qfhtml+=winnerMatch(id,teams);

    });

    document.getElementById("qf")
    .innerHTML=qfhtml;

    const sfMatches={

        SF1:[winners.QF1,winners.QF2],
        SF2:[winners.QF3,winners.QF4]

    };

    let sfhtml="";

    Object.entries(sfMatches)
    .forEach(([id,teams])=>{

        sfhtml+=winnerMatch(id,teams);

    });

    document.getElementById("sf")
    .innerHTML=sfhtml;

    const finalMatch={

        F:[winners.SF1,winners.SF2]

    };

    let finalHtml="";

    Object.entries(finalMatch)
    .forEach(([id,teams])=>{

        finalHtml+=winnerMatch(id,teams);

    });

    document.getElementById("final")
    .innerHTML=finalHtml;

    document.getElementById("champion")
    .innerHTML=
    winners.F
    ? `🏆 Champion: ${winners.F}`
    : "";

}

render();

</script>

</body>
</html>
