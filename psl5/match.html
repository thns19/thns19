<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match — PSL5</title>
<link rel="stylesheet" href="style.css">
<style>
.match-header {
  background: #363C1F;
  border: 1px solid #535c2f;
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1rem;
  text-align: center;
}
.match-teams {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 0.75rem;
  flex-wrap: wrap;
}
.match-team {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 120px;
}
.match-team-logo {
  width: 52px; height: 52px;
  object-fit: contain;
  border-radius: 8px;
  background: #282d15;
  padding: 3px;
}
.match-team-name { font-size: 14px; font-weight: 500; color: #D7DBC8; }
.match-score {
  font-size: 48px;
  font-weight: 500;
  color: #D7DBC8;
  line-height: 1;
  min-width: 80px;
  text-align: center;
}
.match-meta { font-size: 12px; color: #888; margin-top: 6px; }
.match-meta span { margin: 0 8px; }

.breakdown-card {
  background: #363C1F;
  border: 1px solid #535c2f;
  border-radius: 12px;
  padding: 1.25rem;
  margin-bottom: 1rem;
}
.breakdown-title { font-size: 11px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; }

.breakdown-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.breakdown-row:last-child { margin-bottom: 0; }
.bd-team { font-size: 13px; font-weight: 500; color: #D7DBC8; width: 130px; flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
.bd-team img { width: 18px; height: 18px; object-fit: contain; border-radius: 2px; }
.bd-bars { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.bd-bar-row { display: flex; align-items: center; gap: 8px; }
.bd-label { font-size: 11px; color: #888; width: 70px; flex-shrink: 0; }
.bd-track { flex: 1; height: 6px; background: #282d15; border-radius: 3px; overflow: hidden; }
.bd-fill-point { height: 100%; background: #39c877; border-radius: 3px; }
.bd-fill-og { height: 100%; background: #d86254; border-radius: 3px; }
.bd-val { font-size: 12px; color: #D7DBC8; width: 16px; text-align: right; flex-shrink: 0; }

.mvp-card {
  background: #363C1F;
  border: 1px solid #f5c842;
  border-radius: 12px;
  padding: 1.25rem;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 12px;
}
.mvp-icon { font-size: 24px; }
.mvp-label { font-size: 11px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.mvp-name { font-size: 16px; font-weight: 500; color: #f5c842; margin-top: 2px; }

.no-data { font-size: 13px; color: #535c2f; padding: 1rem 0; }
</style>
</head>
<body>
<div class="container" style="max-width:680px;">
  <div class="nav">
    <a href="league.html" class="back">← League</a>
  </div>
  <div id="match-content"></div>
</div>

<script src="matches.js"></script>
<script>
const id = new URLSearchParams(window.location.search).get('id');
const match = matchData.find(m => m.id === id);

if(!match) {
  document.getElementById('match-content').innerHTML = `<p class="no-data">Match not found. <a href="league.html" style="color:#39c877;">← Back to league</a></p>`;
} else {
  const maxScore = Math.max(match.hs, match.as, 1);
  const hb = match.breakdown.home;
  const ab = match.breakdown.away;
  const maxVal = Math.max(hb.points, hb.ownGoals, ab.points, ab.ownGoals, 1);

  function logoImg(name, src, size=52) {
    return src ? `<img class="match-team-logo" src="${src}" onerror="this.style.display='none'" alt="${name}">` : '';
  }

  const LOGOS = {
    "BADiles":"logos/badiles.png","Y&Y":"logos/yy.png","R1":"logos/r1.png",
    "Basement Boys":"logos/basement.png","Volos Drummers":"logos/volos.png",
    "Warriors":"logos/warriors.png","Midi Kidz":"logos/midi.png",
    "Babiniotes":"logos/babiniotes.png","Spasmena Mila":"logos/spasmena.png",
    "Phoenix":"logos/phoenix.png","Snipers":"logos/snipers.png",
    "Team Till Death":"logos/ttd.png","A/C":"logos/ac.png",
    "Fintani":"logos/fintani.png","Axtarmades":"logos/axtarmades.png",
    "Chewbacca":"logos/chewbacca.png","Hoopers":"logos/hoopers.png"
  };

  const mvpHTML = match.mvp ? `
    <div class="mvp-card">
      <div class="mvp-icon">🏅</div>
      <div>
        <div class="mvp-label">Match MVP</div>
        <div class="mvp-name">${match.mvp}</div>
      </div>
    </div>` : '';

  const hasBreakdown = hb.points + hb.ownGoals + ab.points + ab.ownGoals > 0;

  const breakdownHTML = hasBreakdown ? `
    <div class="breakdown-card">
      <div class="breakdown-title">Point Breakdown</div>
      <div class="breakdown-row">
        <div class="bd-team">
          <img src="${LOGOS[match.home]||''}" onerror="this.style.display='none'">
          ${match.home}
        </div>
        <div class="bd-bars">
          <div class="bd-bar-row">
            <span class="bd-label">Clean pts</span>
            <div class="bd-track"><div class="bd-fill-point" style="width:${(hb.points/maxVal)*100}%"></div></div>
            <span class="bd-val">${hb.points}</span>
          </div>
          <div class="bd-bar-row">
            <span class="bd-label">Opp. own goals</span>
            <div class="bd-track"><div class="bd-fill-og" style="width:${(hb.ownGoals/maxVal)*100}%"></div></div>
            <span class="bd-val">${hb.ownGoals}</span>
          </div>
        </div>
      </div>
      <div class="breakdown-row">
        <div class="bd-team">
          <img src="${LOGOS[match.away]||''}" onerror="this.style.display='none'">
          ${match.away}
        </div>
        <div class="bd-bars">
          <div class="bd-bar-row">
            <span class="bd-label">Clean pts</span>
            <div class="bd-track"><div class="bd-fill-point" style="width:${(ab.points/maxVal)*100}%"></div></div>
            <span class="bd-val">${ab.points}</span>
          </div>
          <div class="bd-bar-row">
            <span class="bd-label">Opp. own goals</span>
            <div class="bd-track"><div class="bd-fill-og" style="width:${(ab.ownGoals/maxVal)*100}%"></div></div>
            <span class="bd-val">${ab.ownGoals}</span>
          </div>
        </div>
      </div>
    </div>` : `<div class="breakdown-card"><div class="breakdown-title">Point Breakdown</div><p class="no-data">No breakdown data available for this match.</p></div>`;

  document.title = `${match.home} vs ${match.away} — PSL5`;
  document.getElementById('match-content').innerHTML = `
    <div class="match-header">
      <div class="match-teams">
        <div class="match-team">
          ${logoImg(match.home, LOGOS[match.home])}
          <div class="match-team-name">${match.home}</div>
        </div>
        <div class="match-score">${match.hs}–${match.as}</div>
        <div class="match-team">
          ${logoImg(match.away, LOGOS[match.away])}
          <div class="match-team-name">${match.away}</div>
        </div>
      </div>
      <div class="match-meta">
        ${match.date ? `<span>📅 ${match.date}</span>` : ''}
        <span>PSL5 League Phase</span>
      </div>
    </div>
    ${mvpHTML}
    ${breakdownHTML}`;
}
</script>
</body>
</html>
