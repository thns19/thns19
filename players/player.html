const id = new URLSearchParams(window.location.search).get('id');
const p = players.find(x => x.id === id);

if(!p) {
  document.getElementById('player-content').innerHTML = `
    <p style="color:#888;font-size:14px;">Player not found. <a href="index.html" style="color:#39c877;">← Back to players</a></p>`;
} else {
  const photoSrc = `photos/${p.id}.png`;
  const titlesHTML = p.titles.length
    ? `<div class="titles-grid">${p.titles.map(t=>`<div class="title-card">🏆 ${t}</div>`).join('')}</div>`
    : `<p style="font-size:13px;color:#535c2f;">No titles</p>`;

  const careerHTML = p.seasons.map(s => `
    <div class="career-entry">
      <div class="career-season">${s.season}</div>
      <img class="career-team-logo" src="logos/${s.logo}" onerror="this.src='photos/placeholder.png'" alt="${s.team}">
      <div class="career-info">
        <div class="career-team-name">${s.team}</div>
        ${s.detail ? `<div class="career-detail">${s.detail}</div>` : ''}
      </div>
    </div>`).join('');

  const upcomingHTML = p.upcoming ? `
    <div class="section-card">
      <div class="section-label">Next Match</div>
      <div class="upcoming-match">
        <div>
          <div class="upcoming-team">${p.seasons[p.seasons.length-1].team} <span class="upcoming-vs">vs</span> ${p.upcoming.opponent}</div>
          <div class="upcoming-meta">${p.upcoming.competition} · ${p.upcoming.date}</div>
        </div>
      </div>
    </div>` : '';

  document.title = `${p.name} — Pitchball`;
  document.getElementById('player-content').innerHTML = `
    <div class="player-header">
      <img class="player-header-photo ${p.status==='active'?'active':''}"
        src="${photoSrc}" onerror="this.src='photos/placeholder.png'" alt="${p.name}">
      <div class="player-header-info">
        <div class="player-full-name">${p.name}</div>
        <div class="player-badges">
          <span class="badge ${p.status==='active'?'badge-active':'badge-retired'}">${p.status==='active'?'Active':'Retired'}</span>
          ${p.titles.length ? `<span class="badge badge-title">🏆 ${p.titles.length} Title${p.titles.length>1?'s':''}</span>` : ''}
        </div>
        <p class="player-desc">${p.description}</p>
      </div>
    </div>

    ${upcomingHTML}

    <div class="section-card">
      <div class="section-label">Titles</div>
      ${titlesHTML}
    </div>

    <div class="section-card">
      <div class="section-label">Career</div>
      ${careerHTML}
    </div>`;
}
