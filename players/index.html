let currentFilter = 'all';

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const query = document.getElementById('search').value.toLowerCase();
  const filtered = players.filter(p => {
    const matchFilter = currentFilter === 'all' || p.status === currentFilter;
    const matchSearch = p.name.toLowerCase().includes(query);
    return matchFilter && matchSearch;
  });

  const sort = document.getElementById('sort-select').value;
if(sort === 'az') filtered.sort((a,b) => a.name.localeCompare(b.name));
if(sort === 'za') filtered.sort((a,b) => b.name.localeCompare(a.name));
if(sort === 'titles') filtered.sort((a,b) => b.titles.length - a.titles.length);

  document.getElementById('players-grid').innerHTML = filtered.map(p => {
    const titleCount = p.titles.length;
    const photoSrc = `photos/${p.id}.png`;
    return `<a href="player.html?id=${p.id}" class="player-card ${p.status==='active'?'active-player':''}">
      <img class="player-photo" src="${photoSrc}" onerror="this.src='photos/placeholder.png'" alt="${p.name}">
      <div class="player-name">${p.name}</div>
      <span class="player-status ${p.status==='active'?'status-active':'status-retired'}">${p.status==='active'?'Active':'Retired'}</span>
      <div class="player-titles">${titleCount>0?`<span class="title-icon">🏆</span> ${titleCount} title${titleCount>1?'s':''}` : 'No titles'}</div>
    </a>`;
  }).join('') || '<p style="color:#535c2f;font-size:13px;">No players found.</p>';
}

renderGrid();
